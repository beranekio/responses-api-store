name: Publish container image

on:
  workflow_run:
    workflows: ["Validate"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish container image
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: responses-api-store-ci-image
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Load image
        run: docker load -i responses-api-store-ci.tar

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image tags
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          GIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker tag responses-api-store:ci "${IMAGE}:latest"
          docker tag responses-api-store:ci "${IMAGE}:${GIT_SHA}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${GIT_SHA}"