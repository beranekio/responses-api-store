replicaCount: 1

image:
  repository: ghcr.io/beranekio/responses-api-store
  tag: "0.1.0"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  # Defaults to grpc.port when unset.
  port: 50051

grpc:
  # Canonical gRPC port; containerPort and GRPC_LISTEN_ADDR derive from this unless overridden.
  port: 50051
  # Optional full bind address (e.g. 127.0.0.1:50051). When empty, uses 0.0.0.0:grpc.port.
  listenAddr: ""
  # Max gRPC send/recv size in bytes (default 64 MiB; tonic default is 4 MiB).
  maxMessageBytes: 67108864

store:
  keyPrefix: responses-api-store:responses
  ttlSeconds: 86400
  staleSeconds: 3600

backgroundQueue:
  streamKey: responses-api-store:background
  streamMaxlen: 10000

# Use external Redis/Valkey when valkey.enabled=false.
redis:
  url: ""

# Bundled Valkey is ephemeral (no PVC, snapshots/AOF disabled). Use for dev/smoke
# only; production should set valkey.enabled=false and point redis.url at persistent
# external Redis/Valkey.
valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "8.0"
    pullPolicy: IfNotPresent
  service:
    port: 6379
  persistence:
    enabled: false
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

livenessProbe:
  tcpSocket:
    port: grpc
  initialDelaySeconds: 5
  periodSeconds: 20

readinessProbe:
  exec:
    command:
      - /responses-api-store-probe
  initialDelaySeconds: 3
  periodSeconds: 10
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}