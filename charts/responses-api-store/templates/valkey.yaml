{{- if .Values.valkey.enabled }}
{{- if .Values.valkey.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "responses-api-store.fullname" . }}-valkey
  labels:
    {{- include "responses-api-store.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  accessModes:
    - {{ .Values.valkey.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.valkey.persistence.size }}
  {{- if .Values.valkey.persistence.storageClass }}
  storageClassName: {{ .Values.valkey.persistence.storageClass }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "responses-api-store.fullname" . }}-valkey
  labels:
    {{- include "responses-api-store.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  replicas: 1
  {{- if .Values.valkey.persistence.enabled }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "responses-api-store.name" . }}-valkey
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "responses-api-store.name" . }}-valkey
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: valkey
          image: "{{ .Values.valkey.image.repository }}:{{ .Values.valkey.image.tag }}"
          imagePullPolicy: {{ .Values.valkey.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.valkey.service.port }}
          {{- if .Values.valkey.persistence.enabled }}
          args:
            - "--save"
            - "900"
            - "1"
            - "--appendonly"
            - "yes"
            - "--appendfsync"
            - "everysec"
          volumeMounts:
            - name: data
              mountPath: /data
          {{- else }}
          args:
            - "--save"
            - ""
            - "--appendonly"
            - "no"
          {{- end }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.valkey.service.port }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.valkey.service.port }}
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
      {{- if .Values.valkey.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "responses-api-store.fullname" . }}-valkey
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "responses-api-store.fullname" . }}-valkey
  labels:
    {{- include "responses-api-store.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "responses-api-store.name" . }}-valkey
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: redis
      port: {{ .Values.valkey.service.port }}
      targetPort: {{ .Values.valkey.service.port }}
{{- end }}